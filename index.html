<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogaRooms</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Raleway', sans-serif;
    }

    /* ფონი — სტუდიის ფოტო */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('studio-bg.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(6px) brightness(1.15) saturate(0.7);
      transform: scale(1.05);
      z-index: 0;
    }

    /* მსუბუქი ფიოლეტოვანი ოვერლეი */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(230, 210, 240, 0.35);
      z-index: 1;
    }

    /* ცენტრი */
    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* მრგვალი ლოგო */
    .logo-circle {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 3px solid rgba(180, 130, 210, 0.7);
      box-shadow:
        0 0 0 8px rgba(230, 210, 245, 0.4),
        0 0 40px rgba(180, 130, 210, 0.3),
        0 8px 32px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(2px);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .logo-circle:hover {
      transform: scale(1.04);
      box-shadow:
        0 0 0 10px rgba(230, 210, 245, 0.5),
        0 0 60px rgba(180, 130, 210, 0.45),
        0 12px 40px rgba(0, 0, 0, 0.2);
    }

    a.logo-link {
      text-decoration: none;
      cursor: pointer;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    /* ტექსტი */
    .logo-text {
      text-align: center;
    }

    .logo-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 3.2rem;
      letter-spacing: 0.18em;
      color: #4a2d6b;
      text-shadow: 0 2px 12px rgba(255,255,255,0.7);
    }

    .logo-text span {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      color: #8a5faa;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(255,255,255,0.8);
    }

    .since {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: #9b72bb;
      text-shadow: 0 1px 8px rgba(255,255,255,0.8);
      margin-top: 4px;
    }

    .made-by {
      position: fixed;
      bottom: 16px;
      right: 20px;
      z-index: 99;
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: rgba(138, 95, 170, 0.6);
      text-align: right;
      line-height: 1.5;
      text-shadow: 0 1px 6px rgba(255,255,255,0.5);
      pointer-events: none;
    }

    .made-by span {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: rgba(138, 95, 170, 0.4);
    }

    @media (max-width: 480px) {
      .logo-circle { width: 200px; height: 200px; }
      .logo-text h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <a href="main.html" class="logo-link">
        <div class="logo-circle">
          <img src="logo.jpg" alt="YogaRooms Logo" />
        </div>
      </a>
      <div class="logo-text">
        <h1>YogaRooms</h1>
        <span>იოგა სტუდია</span>
        <em class="since">since 2014</em>
      </div>
    </div>
  </section>

  <div class="made-by">
    <span>designed &amp; built by</span>
    ლიკა ჩაკვეტაძე
  </div>

</body>
</html>
